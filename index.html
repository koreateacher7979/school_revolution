<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>학교 특별실 예약 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            overflow: hidden; 
            overscroll-behavior: none; 
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-[100dvh] w-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 shadow-sm shrink-0 z-40">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="fas fa-calendar-check text-lg"></i>
                </div>
                <h1 class="text-xl sm:text-2xl font-bold text-slate-800 tracking-tight whitespace-nowrap">학교 특별실 예약</h1>
            </div>
            <div class="hidden sm:block text-xs font-medium text-slate-500 bg-slate-100 px-4 py-1.5 rounded-full shadow-inner truncate">
                개발자 : <span class="text-blue-600 font-semibold">가치있는미래교육연구소 대표 김병찬</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-4 w-full grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
        
        <section class="lg:col-span-4 flex flex-col h-full overflow-hidden">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
                <div class="flex items-center gap-2 border-b border-slate-100 pb-3 mb-4 shrink-0">
                    <i class="fas fa-pen-to-square text-blue-500"></i>
                    <h2 class="text-lg font-bold text-slate-800" id="formTitle">새 예약 작성</h2>
                </div>
                
                <div class="overflow-y-auto flex-grow pr-2">
                    <form id="reservationForm" class="space-y-4 pb-2">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">특별실 선택 <span class="text-red-500">*</span></label>
                            <select id="room" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm">
                                <option value="">특별실을 선택하세요</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">예약자 (성명) <span class="text-red-500">*</span></label>
                            <input type="text" id="reserver" required placeholder="예: 홍길동 교사" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">예약 날짜 <span class="text-red-500">*</span></label>
                            <input type="date" id="date" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">시작 시간 <span class="text-red-500">*</span></label>
                                <input type="time" id="startTime" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">종료 시간 <span class="text-red-500">*</span></label>
                                <input type="time" id="endTime" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">사용할 과목 <span class="text-red-500">*</span></label>
                            <input type="text" id="subject" required placeholder="예: 과학, 동아리활동 등" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">사용 목적 <span class="text-red-500">*</span></label>
                            <input type="text" id="purpose" required placeholder="간략한 사용 목적" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">비밀번호 (수정/삭제용) <span class="text-red-500">*</span></label>
                            <input type="password" id="password" required placeholder="4자리 이상 입력" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-sm">
                        </div>
                    </form>
                </div>
                <div class="pt-4 flex gap-3 shrink-0 border-t border-slate-100 mt-2">
                    <button type="button" id="cancelEditBtn" class="hidden w-1/3 py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl transition-colors shadow-sm text-sm">
                        취소
                    </button>
                    <button type="submit" form="reservationForm" id="submitBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-colors shadow-md flex justify-center items-center gap-2 text-sm">
                        <i class="fas fa-check"></i> <span>예약 완료하기</span>
                    </button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-8 flex flex-col h-full overflow-hidden">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 shrink-0">
                    <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i class="fas fa-list text-blue-500"></i> 전체 예약 현황
                    </h2>
                    
                    <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
                        <button id="refreshBtn" title="수동 동기화" class="px-3 py-2 bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200 rounded-lg text-sm transition-colors flex items-center justify-center">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <input type="date" id="filterDate" class="px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 text-sm">
                        <select id="filterRoom" class="px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 text-sm min-w-[130px]">
                            <option value="ALL">모든 특별실</option>
                        </select>
                    </div>
                </div>

                <div class="flex-grow overflow-auto rounded-xl border border-slate-200 relative">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead class="sticky top-0 bg-slate-50 border-b border-slate-200 shadow-sm z-10">
                            <tr class="text-slate-600 text-sm">
                                <th class="py-3 px-4 font-semibold w-24">날짜</th>
                                <th class="py-3 px-4 font-semibold w-28">시간</th>
                                <th class="py-3 px-4 font-semibold w-24">특별실</th>
                                <th class="py-3 px-4 font-semibold w-20">예약자</th>
                                <th class="py-3 px-4 font-semibold w-24">과목</th>
                                <th class="py-3 px-4 font-semibold">목적</th>
                                <th class="py-3 px-4 font-semibold text-center w-24">관리</th>
                            </tr>
                        </thead>
                        <tbody id="reservationList" class="divide-y divide-slate-100 text-sm bg-white">
                            <tr><td colspan="7" class="py-10 text-center text-slate-400">데이터를 불러오는 중입니다...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- 비밀번호 확인 모달 -->
    <div id="passwordModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
        <form id="passwordModalForm" class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-sm transform scale-95 transition-transform duration-300">
            <h3 class="text-lg font-bold text-slate-800 mb-2" id="modalTitle">권한 확인</h3>
            <p class="text-sm text-slate-500 mb-4" id="modalDesc">예약시 입력했던 비밀번호를 입력해주세요.</p>
            
            <input type="password" id="modalPassword" class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 mb-5" placeholder="비밀번호 입력">
            
            <div class="flex gap-2">
                <button type="button" onclick="closeModal()" class="w-1/2 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-lg transition-colors">취소</button>
                <button type="submit" class="w-1/2 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors">확인</button>
            </div>
        </form>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast" class="fixed bottom-6 right-6 hidden items-center gap-3 px-6 py-4 rounded-xl shadow-lg text-white font-medium z-50">
        <i id="toastIcon" class="fas"></i>
        <span id="toastMsg"></span>
    </div>

    <script>
        // ==========================================
        // 설정 영역: 배포한 구글 앱스 스크립트 웹앱 URL 입력
        // ==========================================
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwV7uj35NCZBUDGDngQBKqqHqWC4RCmp8L--9RskaB6HV5G_EAjGMGSXBzDzN1wcpw/exec"; 
        
        let rooms = ['음악실', '미술실', '과학실', '컴퓨터실', '체육관', '시청각실']; 
        let reservations = [];
        let currentEditingId = null;
        let pendingAction = null; 
        let pendingTargetId = null;
        let isProcessing = false; // 중복 요청 방지 및 동기화 락

        const DOM = {
            form: document.getElementById('reservationForm'),
            roomSelect: document.getElementById('room'),
            date: document.getElementById('date'),
            filterRoomSelect: document.getElementById('filterRoom'),
            filterDate: document.getElementById('filterDate'),
            reservationList: document.getElementById('reservationList'),
            submitBtn: document.getElementById('submitBtn'),
            cancelEditBtn: document.getElementById('cancelEditBtn'),
            formTitle: document.getElementById('formTitle'),
            refreshBtn: document.getElementById('refreshBtn'),
            modal: document.getElementById('passwordModal'),
            modalForm: document.getElementById('passwordModalForm'),
            modalPassword: document.getElementById('modalPassword'),
            modalTitle: document.getElementById('modalTitle'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toastMsg'),
            toastIcon: document.getElementById('toastIcon')
        };

        window.addEventListener('DOMContentLoaded', async () => {
            const today = new Date().toISOString().split('T')[0];
            DOM.filterDate.value = ""; 
            DOM.date.value = today; 

            if (GAS_WEB_APP_URL) {
                await fetchDataFromGAS(false); 
                startRealtimeSync(); 
            } else {
                renderOptions();
                renderList();
            }

            DOM.filterDate.addEventListener('change', renderList);
            DOM.filterRoomSelect.addEventListener('change', renderList);
            DOM.refreshBtn.addEventListener('click', () => fetchDataFromGAS(false));
        });

        // 실시간 동기화
        function startRealtimeSync() {
            setInterval(async () => {
                if (!GAS_WEB_APP_URL || currentEditingId || pendingAction || isProcessing) return;
                await fetchDataFromGAS(true); 
            }, 1000); 
        }

        // ==========================================
        // 데이터 정제
        // ==========================================
        const formatTimeSafe = (timeStr) => {
            if (!timeStr) return '';
            let s = String(timeStr).replace(/^'/, ''); 
            if (s.includes('T')) return s.split('T')[1].substring(0, 5); 
            if (/^\d{2}:\d{2}:\d{2}/.test(s)) return s.substring(0, 5); 
            return s.replace(/~/g, ':'); 
        };

        const processReservations = (rawList) => {
            return rawList.map(res => {
                let parsedDate = String(res.date).replace(/^'/, '');
                if (parsedDate && !/^\d{4}-\d{2}-\d{2}$/.test(parsedDate)) {
                    const d = new Date(parsedDate);
                    if (!isNaN(d.getTime())) {
                        const year = d.getFullYear();
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        const day = String(d.getDate()).padStart(2, '0');
                        parsedDate = `${year}-${month}-${day}`;
                    }
                }
                
                // 비밀번호의 보이지 않는 특수문자 및 찌꺼기 완벽 제거
                let rawPwd = String(res.password).trim();
                rawPwd = rawPwd.replace(/^['\u200B]+/, '');
                if (rawPwd.startsWith('PWD_')) rawPwd = rawPwd.substring(4); 

                return { 
                    ...res, 
                    id: String(res.id).trim(), 
                    date: parsedDate,
                    startTime: formatTimeSafe(res.startTime),
                    endTime: formatTimeSafe(res.endTime),
                    password: rawPwd
                };
            });
        };

        // ==========================================
        // 렌더링
        // ==========================================
        function renderOptions() {
            const curRoom = DOM.roomSelect.value;
            const curFilter = DOM.filterRoomSelect.value;

            DOM.roomSelect.innerHTML = '<option value="">특별실을 선택하세요</option>' + 
                rooms.map(room => `<option value="${room}">${room}</option>`).join('');
            DOM.roomSelect.value = curRoom;

            DOM.filterRoomSelect.innerHTML = '<option value="ALL">모든 특별실</option>' + 
                rooms.map(room => `<option value="${room}">${room}</option>`).join('');
            DOM.filterRoomSelect.value = curFilter || 'ALL';
        }

        function renderList() {
            const fDate = DOM.filterDate.value;
            const fRoom = DOM.filterRoomSelect.value;

            let filtered = reservations.filter(res => {
                let matchDate = fDate ? res.date === fDate : true;
                let matchRoom = fRoom !== 'ALL' ? res.room === fRoom : true;
                return matchDate && matchRoom;
            });

            filtered.sort((a, b) => {
                if (a.date !== b.date) return a.date.localeCompare(b.date);
                return a.startTime.localeCompare(b.startTime);
            });

            if (filtered.length === 0) {
                DOM.reservationList.innerHTML = `<tr><td colspan="7" class="py-12 text-center text-slate-400 bg-white"><i class="fas fa-folder-open text-3xl mb-3 opacity-50 block"></i>예약된 내역이 없습니다.</td></tr>`;
                return;
            }

            DOM.reservationList.innerHTML = filtered.map(res => `
                <tr class="bg-white hover:bg-blue-50/50 transition-colors border-b border-slate-100 last:border-0 group">
                    <td class="py-3 px-4 text-slate-700 whitespace-nowrap">${res.date}</td>
                    <td class="py-3 px-4 font-semibold text-blue-600 whitespace-nowrap">${res.startTime} ~ ${res.endTime}</td>
                    <td class="py-3 px-4 font-medium text-slate-800 whitespace-nowrap">
                        <span class="inline-block bg-slate-100 text-slate-700 px-2 py-1 rounded text-xs border border-slate-200">${res.room}</span>
                    </td>
                    <td class="py-3 px-4 text-slate-700 truncate max-w-[100px]">${res.reserver}</td>
                    <td class="py-3 px-4 text-slate-600 truncate max-w-[120px]" title="${res.subject}">${res.subject}</td>
                    <td class="py-3 px-4 text-slate-600 truncate max-w-[150px]" title="${res.purpose}">${res.purpose}</td>
                    <td class="py-3 px-4 text-center whitespace-nowrap">
                        <div class="flex justify-center gap-1 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                            <button onclick="requestAction('edit', '${res.id}')" class="p-1.5 text-slate-400 hover:text-blue-500 transition-colors" title="수정"><i class="fas fa-edit"></i></button>
                            <button onclick="requestAction('delete', '${res.id}')" class="p-1.5 text-slate-400 hover:text-red-500 transition-colors" title="삭제"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ==========================================
        // 로직 처리 (예약 추가/수정)
        // ==========================================
        DOM.form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newData = {
                id: String(currentEditingId || 'ID_' + Date.now()).trim(), 
                room: document.getElementById('room').value,
                reserver: document.getElementById('reserver').value,
                date: document.getElementById('date').value,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                subject: document.getElementById('subject').value,
                purpose: document.getElementById('purpose').value,
                password: "PWD_" + String(document.getElementById('password').value).trim(),
            };

            if (newData.startTime >= newData.endTime) {
                showToast("종료 시간은 시작 시간보다 늦어야 합니다.", "error");
                return;
            }

            if (isOverlapping(newData, currentEditingId)) {
                showToast(`[시간 중복] 해당 일자/시간에 '${newData.room}'은 이미 예약되어 있습니다.`, "error");
                return;
            }

            if (GAS_WEB_APP_URL) {
                const action = currentEditingId ? 'update' : 'create';
                await sendToGAS(action, newData);
            }

            resetForm();
        });

        function isOverlapping(newRes, ignoreId = null) {
            return reservations.some(res => {
                if (ignoreId && res.id === ignoreId) return false;
                if (res.room !== newRes.room) return false;
                if (res.date !== newRes.date) return false;
                return (newRes.startTime < res.endTime && newRes.endTime > res.startTime);
            });
        }

        // ==========================================
        // 모달 및 삭제/수정 프로세스
        // ==========================================
        function requestAction(action, id) {
            pendingAction = action;
            pendingTargetId = String(id).trim();
            
            DOM.modalTitle.innerText = action === 'edit' ? "예약 수정 권한 확인" : "예약 삭제 권한 확인";
            DOM.modalPassword.value = '';
            
            DOM.modal.classList.remove('hidden');
            setTimeout(() => {
                DOM.modal.classList.remove('opacity-0');
                DOM.modalForm.classList.remove('scale-95');
                DOM.modalForm.classList.add('scale-100');
            }, 10);
            DOM.modalPassword.focus();
        }

        function closeModal() {
            DOM.modal.classList.add('opacity-0');
            DOM.modalForm.classList.remove('scale-100');
            DOM.modalForm.classList.add('scale-95');
            setTimeout(() => {
                DOM.modal.classList.add('hidden');
            }, 300);
            // 이곳에서 초기화하던 변수들은 submit 로직이 완료된 후에 직접 초기화하도록 수정되었습니다.
        }

        DOM.modalForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const typedPw = String(DOM.modalPassword.value).trim();
            const targetRes = reservations.find(r => r.id === pendingTargetId);
            
            if (!typedPw) {
                alert("비밀번호를 입력해주세요.");
                return;
            }

            if (!targetRes) {
                showToast("데이터를 찾을 수 없습니다. 새로고침을 해주세요.", "error");
                closeModal();
                pendingAction = null;
                pendingTargetId = null;
                return;
            }

            let storedPw = String(targetRes.password).trim();
            let isMatch = (storedPw === typedPw);
            
            if (!isMatch) {
                let numStored = Number(storedPw);
                let numTyped = Number(typedPw);
                if (!isNaN(numStored) && !isNaN(numTyped) && numStored === numTyped) {
                    isMatch = true;
                }
            }

            if (!isMatch) {
                showToast("비밀번호가 일치하지 않습니다.", "error");
                return;
            }

            // [버그 수정] 모달이 닫히면서 변수가 날아가는 것을 방지하기 위해 수행할 작업을 미리 캐싱합니다.
            const actionToPerform = pendingAction;
            const targetIdToPerform = pendingTargetId;

            closeModal();
            pendingAction = null;
            pendingTargetId = null;

            if (actionToPerform === 'edit') {
                startEditing(targetRes);
            } else if (actionToPerform === 'delete') {
                if(confirm("정말로 이 예약을 삭제하시겠습니까?")) {
                    await deleteReservation(targetIdToPerform);
                }
            }
        });

        async function deleteReservation(id) {
            if (GAS_WEB_APP_URL) {
                await sendToGAS('delete', { id: id });
            }
        }

        function startEditing(res) {
            currentEditingId = res.id;
            
            document.getElementById('room').value = res.room;
            document.getElementById('reserver').value = res.reserver;
            document.getElementById('date').value = res.date;
            document.getElementById('startTime').value = res.startTime;
            document.getElementById('endTime').value = res.endTime;
            document.getElementById('subject').value = res.subject;
            document.getElementById('purpose').value = res.purpose;
            document.getElementById('password').value = res.password;

            DOM.formTitle.innerHTML = `<span class="text-blue-600">예약 수정 모드</span>`;
            DOM.submitBtn.innerHTML = `<i class="fas fa-save"></i> <span>수정 완료하기</span>`;
            DOM.submitBtn.classList.replace('bg-blue-600', 'bg-emerald-600');
            DOM.submitBtn.classList.replace('hover:bg-blue-700', 'hover:bg-emerald-700');
            DOM.cancelEditBtn.classList.remove('hidden');
        }

        DOM.cancelEditBtn.addEventListener('click', resetForm);

        function resetForm() {
            DOM.form.reset();
            currentEditingId = null;
            DOM.date.value = new Date().toISOString().split('T')[0];

            DOM.formTitle.innerHTML = `새 예약 작성`;
            DOM.submitBtn.innerHTML = `<i class="fas fa-check"></i> <span>예약 완료하기</span>`;
            DOM.submitBtn.classList.replace('bg-emerald-600', 'bg-blue-600');
            DOM.submitBtn.classList.replace('hover:bg-emerald-700', 'hover:bg-blue-700');
            DOM.cancelEditBtn.classList.add('hidden');
        }

        function showToast(message, type = "success") {
            DOM.toastMsg.innerText = message;
            
            DOM.toast.classList.remove('hidden', 'bg-emerald-500', 'bg-red-500', 'bg-blue-500', 'toast-animate');
            DOM.toastIcon.className = 'fas text-xl'; 

            if (type === "success") {
                DOM.toast.classList.add('bg-emerald-500', 'toast-animate');
                DOM.toastIcon.classList.add('fa-check-circle');
            } else if (type === "error") {
                DOM.toast.classList.add('bg-red-500', 'toast-animate');
                DOM.toastIcon.classList.add('fa-exclamation-circle');
            } else {
                DOM.toast.classList.add('bg-blue-500', 'toast-animate');
                DOM.toastIcon.classList.add('fa-info-circle');
            }

            DOM.toast.style.display = 'flex';
            
            setTimeout(() => {
                DOM.toast.classList.remove('toast-animate');
                DOM.toast.style.display = 'none';
            }, 3000);
        }

        // ==========================================
        // Google Apps Script 통신
        // ==========================================
        async function fetchDataFromGAS(silent = false) {
            try {
                const urlWithTimestamp = GAS_WEB_APP_URL + '?action=read&t=' + new Date().getTime();
                const response = await fetch(urlWithTimestamp);
                const result = await response.json();
                
                if(result.status === 'success') {
                    const newData = processReservations(result.reservations || []);
                    const fetchedRooms = result.rooms || [];
                    
                    if(JSON.stringify(newData) !== JSON.stringify(reservations) || JSON.stringify(fetchedRooms) !== JSON.stringify(rooms)) {
                        rooms = fetchedRooms;
                        reservations = newData;
                        renderOptions();
                        renderList();
                        if(!silent) showToast("데이터 동기화 완료", "success");
                    }
                }
            } catch (error) {
                if(!silent) {
                    console.error("GAS Fetch Error:", error);
                    showToast("통신 오류가 발생했습니다.", "error");
                }
            }
        }

        async function sendToGAS(action, data) {
            return new Promise((resolve) => {
                isProcessing = true;
                showToast("처리 중입니다...", "info");
                
                // 브라우저 리다이렉트 및 CORS로 인한 데이터 유실을 방지하는 iframe 폼 전송 방식
                const iframeName = 'gasIframe_' + Date.now();
                const iframe = document.createElement('iframe');
                iframe.name = iframeName;
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = GAS_WEB_APP_URL;
                form.target = iframeName;
                form.style.display = 'none';

                const actionInput = document.createElement('input');
                actionInput.name = 'action';
                actionInput.value = action;
                form.appendChild(actionInput);

                const dataInput = document.createElement('input');
                dataInput.name = 'data';
                dataInput.value = JSON.stringify(data);
                form.appendChild(dataInput);

                document.body.appendChild(form);

                let isLoaded = false;
                iframe.onload = () => {
                    if (isLoaded) return;
                    isLoaded = true;
                    
                    setTimeout(async () => {
                        await fetchDataFromGAS(true);
                        showToast(action === 'delete' ? "삭제가 완료되었습니다." : "예약 처리가 완료되었습니다.", "success");
                        isProcessing = false;
                        iframe.remove();
                        form.remove();
                        resolve(true);
                    }, 1000);
                };

                form.submit();
            });
        }
    </script>
</body>
